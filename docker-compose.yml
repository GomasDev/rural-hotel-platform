version: "3.9"

services:
  backend:
    image: node:20-alpine
    container_name: ruralhot-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=ruralhot
      - DATABASE_PASSWORD=ruralhot
      - DATABASE_NAME=ruralhot
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: ruralhot-db
    restart: always
    environment:
      - POSTGRES_USER=ruralhot
      - POSTGRES_PASSWORD=ruralhot
      - POSTGRES_DB=ruralhot
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    container_name: ruralhot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: ruralhot-pgadmin
    restart: always
    profiles: ["dev"]
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

  mailpit:
    image: axllent/mailpit
    container_name: ruralhot-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web
    restart: unless-stopped

volumes:
  db-data:
